<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Session Setup</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page narrow">
      <section class="hero compact">
        <p class="eyebrow">Setup</p>
        <h1>Start from your text prompt</h1>
        <p class="lede">Describe the image you want first, then tune the session settings around that prompt.</p>
      </section>
      <section class="card">
        <form id="setup-form" class="form-grid">
          <p id="page-status" class="status-message" role="status" aria-live="polite" hidden></p>
          <label>Prompt<textarea name="prompt" required autofocus>A cinematic mountain road at sunrise</textarea></label>
          <label>Negative prompt<textarea name="negative_prompt">blurry, distorted</textarea></label>
          <label>Experiment name<input name="experiment_name" value="Baseline experiment" required></label>
          <label>Description<input name="description" value="Initial real generation workflow"></label>
          <label>Session configuration (YAML)
            <textarea name="config_yaml" id="config-yaml-editor" class="yaml-editor" spellcheck="false">{{ config_yaml }}</textarea>
          </label>
          <p class="hint">All per-session strategy values live in this YAML document. Edit it before creating a session, or reload the default template.</p>
          <div class="actions">
            <button class="button secondary" type="button" id="reload-config-button">Reload default YAML</button>
            <button class="button" type="submit" id="setup-submit-button">Create and open session</button>
            <a class="button secondary" href="/">Back</a>
          </div>
        </form>
      </section>
      <section class="card trace-card">
        <div class="section-head">
          <h2>Frontend Trace</h2>
          <span>browser + server</span>
        </div>
        <ul id="trace-log" class="trace-log"></ul>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
