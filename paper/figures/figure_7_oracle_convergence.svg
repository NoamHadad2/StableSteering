<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Oracle target-recovery convergence</title>
  <desc id="desc">Average best candidate similarity to the hidden target image across steering rounds, with the round-one baseline score shown as a reference line.</desc>
  <style>
    .bg { fill: #fbfaf6; }
    .axis { stroke: #475467; stroke-width: 2.2; }
    .grid { stroke: #d8cfbf; stroke-width: 1.2; }
    .mean { fill: none; stroke: #8b4513; stroke-width: 4; }
    .base { fill: none; stroke: #5b7da6; stroke-width: 3; stroke-dasharray: 10 8; }
    .tick { font: 15px Georgia, 'Times New Roman', serif; fill: #344054; }
    .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #1f2937; }
    .label { font: 700 18px Georgia, 'Times New Roman', serif; fill: #1f2937; }
    .legend { font: 15px Georgia, 'Times New Roman', serif; fill: #1f2937; }
    .dot { fill: #8b4513; }
  </style>
  <rect class="bg" width="1100" height="620"/>
  <text class="title" x="70" y="46">Oracle Target-Recovery Convergence</text>
  <line class="axis" x1="90" y1="70" x2="90" y2="540"/>
  <line class="axis" x1="90" y1="540" x2="1040" y2="540"/>
  <line class="grid" x1="90" y1="540.0" x2="1040" y2="540.0"/>
  <text class="tick" x="78" y="545.0" text-anchor="end">0.805</text>
  <line class="grid" x1="90" y1="422.5" x2="1040" y2="422.5"/>
  <text class="tick" x="78" y="427.5" text-anchor="end">0.833</text>
  <line class="grid" x1="90" y1="305.0" x2="1040" y2="305.0"/>
  <text class="tick" x="78" y="310.0" text-anchor="end">0.860</text>
  <line class="grid" x1="90" y1="187.5" x2="1040" y2="187.5"/>
  <text class="tick" x="78" y="192.5" text-anchor="end">0.888</text>
  <line class="grid" x1="90" y1="70.0" x2="1040" y2="70.0"/>
  <text class="tick" x="78" y="75.0" text-anchor="end">0.916</text>
  <line class="grid" x1="90.0" y1="70" x2="90.0" y2="540"/>
  <text class="tick" x="90.0" y="566" text-anchor="middle">1</text>
  <line class="grid" x1="195.6" y1="70" x2="195.6" y2="540"/>
  <text class="tick" x="195.6" y="566" text-anchor="middle">2</text>
  <line class="grid" x1="301.1" y1="70" x2="301.1" y2="540"/>
  <text class="tick" x="301.1" y="566" text-anchor="middle">3</text>
  <line class="grid" x1="406.7" y1="70" x2="406.7" y2="540"/>
  <text class="tick" x="406.7" y="566" text-anchor="middle">4</text>
  <line class="grid" x1="512.2" y1="70" x2="512.2" y2="540"/>
  <text class="tick" x="512.2" y="566" text-anchor="middle">5</text>
  <line class="grid" x1="617.8" y1="70" x2="617.8" y2="540"/>
  <text class="tick" x="617.8" y="566" text-anchor="middle">6</text>
  <line class="grid" x1="723.3" y1="70" x2="723.3" y2="540"/>
  <text class="tick" x="723.3" y="566" text-anchor="middle">7</text>
  <line class="grid" x1="828.9" y1="70" x2="828.9" y2="540"/>
  <text class="tick" x="828.9" y="566" text-anchor="middle">8</text>
  <line class="grid" x1="934.4" y1="70" x2="934.4" y2="540"/>
  <text class="tick" x="934.4" y="566" text-anchor="middle">9</text>
  <line class="grid" x1="1040.0" y1="70" x2="1040.0" y2="540"/>
  <text class="tick" x="1040.0" y="566" text-anchor="middle">10</text>
  <polyline class="base" points="90.0,455.2 195.6,455.2 301.1,455.2 406.7,455.2 512.2,455.2 617.8,455.2 723.3,455.2 828.9,455.2 934.4,455.2 1040.0,455.2"/>
  <polyline class="mean" points="90.0,186.0 195.6,186.0 301.1,181.5 406.7,154.8 512.2,154.8 617.8,154.8 723.3,154.8 828.9,154.8 934.4,154.8 1040.0,154.8"/>
  <circle class="dot" cx="90.0" cy="186.0" r="5"/>
  <circle class="dot" cx="195.6" cy="186.0" r="5"/>
  <circle class="dot" cx="301.1" cy="181.5" r="5"/>
  <circle class="dot" cx="406.7" cy="154.8" r="5"/>
  <circle class="dot" cx="512.2" cy="154.8" r="5"/>
  <circle class="dot" cx="617.8" cy="154.8" r="5"/>
  <circle class="dot" cx="723.3" cy="154.8" r="5"/>
  <circle class="dot" cx="828.9" cy="154.8" r="5"/>
  <circle class="dot" cx="934.4" cy="154.8" r="5"/>
  <circle class="dot" cx="1040.0" cy="154.8" r="5"/>

  <text class="label" x="565.0" y="600" text-anchor="middle">Round index</text>
  <text class="label" transform="translate(24,305.0) rotate(-90)" text-anchor="middle">CLIP cosine to target</text>
  <line class="mean" x1="840" y1="100" x2="900" y2="100"/>
  <text class="legend" x="912" y="105">Mean best candidate score</text>
  <line class="base" x1="840" y1="132" x2="900" y2="132"/>
  <text class="legend" x="912" y="137">Mean round-one baseline score</text>
</svg>
