    .dino { fill: none; stroke: #1f6f8b; stroke-width: 3.8; }
    .dinoBase { fill: none; stroke: #1f6f8b; stroke-width: 2.2; stroke-dasharray: 10 7; opacity: 0.65; }
    .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #1f2937; }
