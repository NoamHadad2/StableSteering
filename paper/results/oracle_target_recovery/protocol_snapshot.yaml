suite_name: oracle_target_recovery
description: Small curated real-image target suite for oracle-based steering recovery.
oracle_model: openai/clip-vit-base-patch32
max_rounds: 10
fixed_conditions:
  sampler: exploit_orthogonal
  updater: linear_preference
  feedback_mode: winner_only
  seed_policy: fixed-per-candidate
  steering_mode: low_dimensional
  steering_dimension: 5
  candidate_count: 4
  image_size: 512x512
  trust_radius: 0.65
  anchor_strength: 0.8
  guidance_scale: 7.5
  num_inference_steps: 15
  model_name: runwayml/stable-diffusion-v1-5
targets:
- id: mountain_lake
  label: Mountain lake landscape
  image_url: https://commons.wikimedia.org/wiki/Special:Redirect/file/Mountain%20lake.jpg
  caption: A serene mountain lake bordered by evergreen forest with snow-capped peaks
    in the background under clear daylight.
  negative_prompt: low detail, blurry, distorted mountains, text, watermark, people,
    buildings
  attribution: Wikimedia Commons, source page File:Mountain lake.jpg
- id: cat_portrait_bw
  label: Black-and-white cat portrait
  image_url: https://commons.wikimedia.org/wiki/Special:Redirect/file/Cat_portrait_B%26W.JPG
  caption: A close-up black and white portrait of a bicolor cat with bright eyes against
    a dark background.
  negative_prompt: low detail, blur, extra eyes, distorted face, text, watermark,
    cluttered background
  attribution: Wikimedia Commons, source page File:Cat portrait B&W.JPG
- id: red_bicycle
  label: Red bicycle street photo
  image_url: https://commons.wikimedia.org/wiki/Special:Redirect/file/The%20Red%20Bicycle.%20%2815655615295%29.jpg
  caption: A red bicycle parked outdoors on a quiet street in daylight with an urban
    wall or building nearby.
  negative_prompt: low detail, blurry, extra wheels, warped frame, text, watermark,
    crowded scene
  attribution: Wikimedia Commons, source page File:The Red Bicycle. (15655615295).jpg
