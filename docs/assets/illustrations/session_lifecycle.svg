<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Session lifecycle</title>
  <desc id="desc">Diagram showing the prompt-first session lifecycle from setup through async jobs, feedback, incumbent carry-forward, and replay.</desc>
  <style>
    .bg { fill: #fcfbf8; }
    .box { fill: #ffffff; stroke: #31445e; stroke-width: 2.5; rx: 18; ry: 18; }
    .accent { fill: #eef4ff; }
    .decision { fill: #fff4de; }
    .done { fill: #eaf7ee; }
    .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .body { font: 15px 'Segoe UI', Arial, sans-serif; fill: #344054; }
    .arrow { stroke: #4b5f80; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4b5f80"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="60" y="56">Prompt-First Session Lifecycle</text>

  <rect class="box accent" x="50" y="120" width="170" height="110"/>
  <text class="label" x="75" y="160">1. Setup</text>
  <text class="body" x="75" y="190">Prompt</text>
  <text class="body" x="75" y="214">Negative prompt</text>

  <rect class="box accent" x="260" y="120" width="190" height="110"/>
  <text class="label" x="285" y="160">2. Session Created</text>
  <text class="body" x="285" y="190">YAML parsed into</text>
  <text class="body" x="285" y="214">StrategyConfig snapshot</text>

  <rect class="box accent" x="500" y="120" width="210" height="110"/>
  <text class="label" x="525" y="160">3. Round Job Starts</text>
  <text class="body" x="525" y="190">queued -> running</text>
  <text class="body" x="525" y="214">progress visible in UI</text>

  <rect class="box accent" x="760" y="120" width="180" height="110"/>
  <text class="label" x="785" y="160">4. Candidates</text>
  <text class="body" x="785" y="190">Round 1 keeps baseline</text>
  <text class="body" x="785" y="214">Later rounds keep winner</text>

  <rect class="box decision" x="980" y="120" width="170" height="110"/>
  <text class="label" x="1005" y="160">5. Feedback</text>
  <text class="body" x="1005" y="190">Explicit mode-specific</text>
  <text class="body" x="1005" y="214">user choice</text>

  <rect class="box accent" x="835" y="340" width="220" height="120"/>
  <text class="label" x="860" y="382">6. Update Job</text>
  <text class="body" x="860" y="412">Normalize and validate</text>
  <text class="body" x="860" y="436">Compute next incumbent z</text>

  <rect class="box accent" x="500" y="340" width="240" height="120"/>
  <text class="label" x="525" y="382">7. Next Round State</text>
  <text class="body" x="525" y="412">Winner carried forward</text>
  <text class="body" x="525" y="436">Sampler fills remaining slots</text>

  <rect class="box done" x="180" y="340" width="250" height="120"/>
  <text class="label" x="205" y="382">8. Replay and Trace Report</text>
  <text class="body" x="205" y="412">Saved events, images,</text>
  <text class="body" x="205" y="436">diagnostics, and HTML report</text>

  <path class="arrow" d="M220 175 L260 175"/>
  <path class="arrow" d="M450 175 L500 175"/>
  <path class="arrow" d="M710 175 L760 175"/>
  <path class="arrow" d="M940 175 L980 175"/>
  <path class="arrow" d="M1065 230 L1065 340"/>
  <path class="arrow" d="M835 400 L740 400"/>
  <path class="arrow" d="M500 400 L430 400"/>
  <path class="arrow" d="M620 340 L620 230"/>

  <text class="body" x="570" y="286">repeat until satisfied</text>
</svg>
